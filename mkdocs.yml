site_name: pdf-defang
site_description: Strip JavaScript and active content from PDFs - lightweight Python library
site_author: kovetz.co.il
site_url: https://kovetz-PDF.github.io/pdf-defang/

repo_name: kovetz-PDF/pdf-defang
repo_url: https://github.com/kovetz-PDF/pdf-defang
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    logo: material/shield-lock-outline

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - User Guide:
      - Use Cases: use-cases.md
      - CLI Reference: cli.md
      - API Reference: api.md
  - Security:
      - What we strip: protections.md
      - Limitations: limitations.md
      - Vulnerability disclosure: security.md
  - Compare:
      - vs Dangerzone: compare/dangerzone.md
      - vs commercial SDKs: compare/commercial.md
  - About:
      - Origin story: origin.md
      - Changelog: changelog.md
      - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kovetz-PDF/pdf-defang
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pdf-defang/
    - icon: fontawesome/solid/globe
      link: https://kovetz.co.il
